version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_URL=postgres://postgres:password@db:5432/todo_db
      - JWT_SECRET=super_secret_jwt_key_please_change
    depends_on:
      - db
    command: sh -c "npx sequelize-cli db:migrate && npm start"

volumes:
  pgdata: